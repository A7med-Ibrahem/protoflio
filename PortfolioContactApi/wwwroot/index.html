<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Contact Form</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 40px 16px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, textarea { width: 100%; margin-top: 6px; padding: 10px; border: 1px solid #d0d7e2; border-radius: 6px; box-sizing: border-box; }
    textarea { min-height: 120px; resize: vertical; }
    button { margin-top: 16px; padding: 10px 16px; border: none; background: #0b5fff; color: white; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 12px; font-weight: 600; }
    .success { color: #0f7b0f; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Me</h1>
    <form id="contactForm">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required minlength="2" maxlength="100" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required maxlength="200" />

      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" required minlength="3" maxlength="200" />

      <label for="message">Message</label>
      <textarea id="message" name="message" required minlength="10" maxlength="4000"></textarea>

      <button id="submitBtn" type="submit">Send Message</button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.textContent = '';
      statusEl.className = 'status';
      submitBtn.disabled = true;

      const payload = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        subject: form.subject.value.trim(),
        message: form.message.value.trim()
      };

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Failed to send message.');
        }

        statusEl.textContent = result.message;
        statusEl.classList.add('success');
        form.reset();
      } catch (error) {
        statusEl.textContent = error.message || 'Something went wrong.';
        statusEl.classList.add('error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
